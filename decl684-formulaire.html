<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Déclaration d'actifs (684)</title>
<style>*{box-sizing:border-box}body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#f4f4f5;margin:0;padding:16px;color:#18181b}
.c{max-width:560px;margin:0 auto}h1{font-size:20px;margin:8px 0}.intro{color:#52525b;font-size:14px;margin-bottom:18px}
.card{background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:18px;margin-bottom:14px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:#71717a;margin:0 0 12px}
label{display:block;font-size:12.5px;color:#52525b;margin:10px 0 4px}
input,select,textarea{width:100%;font-size:16px;padding:11px;border:1px solid #d4d4d8;border-radius:9px;background:#fff;font-family:inherit}
textarea{min-height:70px}.row{display:flex;gap:8px;margin-bottom:8px}.row>*{flex:1}
.add{background:none;border:0;color:#CE1126;font-weight:600;font-size:14px;padding:8px 0;cursor:pointer}
.send{width:100%;background:#CE1126;color:#fff;border:0;border-radius:11px;padding:15px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px}
.send:disabled{opacity:.6}.ok{text-align:center;padding:40px 20px}.ok h2{color:#16a34a;font-size:42px;margin:0}.err{color:#b91c1c}</style></head>
<body><div class="c" id="root"><div class="card ok"><h2>…</h2></div></div>
<script>
var FONC="https://mcoryyirdrtzpogiqkbm.supabase.co/functions/v1/d";
var I={fr:{titre:"Déclaration d'actifs (art. 684 C.P.C.)",intro:"Veuillez remplir ce formulaire. Vos réponses sont transmises de façon sécurisée à l'étude.",identite:"Identité",nom:"Nom et prénom",naiss:"Date de naissance",adresse:"Adresse complète",tels:"Téléphones",courriels:"Courriels",ajouter:"+ Ajouter",numero:"Numéro",courriel:"Courriel",emploi:"Situation d'emploi",nomEmp:"Nom de l'employeur",adrEmp:"Adresse",telEmp:"Téléphone",residence:"Résidence principale",compte:"Compte bancaire",inst:"Institution",succ:"Adresse de la succursale",signature:"Date de signature",notes:"Notes (facultatif)",envoyer:"Envoyer ma déclaration",merci:"Merci ! Votre déclaration a été transmise à l'étude.",invalide:"Ce lien n'est plus valide (expiré ou déjà utilisé). Contactez l'étude.",salarie:"Salarié",autonome:"Travailleur autonome",autre:"Autre",proprio:"Propriétaire",locataire:"Locataire",cell:"Cellulaire",res:"Résidence",trav:"Travail",envoi:"Envoi en cours…"},
en:{titre:"Statement of assets (art. 684 C.C.P.)",intro:"Please complete this form. Your answers are sent securely to the office.",identite:"Identity",nom:"Full name",naiss:"Date of birth",adresse:"Full address",tels:"Phone numbers",courriels:"Emails",ajouter:"+ Add",numero:"Number",courriel:"Email",emploi:"Employment",nomEmp:"Employer name",adrEmp:"Address",telEmp:"Phone",residence:"Primary residence",compte:"Bank account",inst:"Institution",succ:"Branch address",signature:"Signature date",notes:"Notes (optional)",envoyer:"Submit my statement",merci:"Thank you! Your statement has been sent to the office.",invalide:"This link is no longer valid (expired or already used). Please contact the office.",salarie:"Employee",autonome:"Self-employed",autre:"Other",proprio:"Owner",locataire:"Tenant",cell:"Mobile",res:"Home",trav:"Work",envoi:"Sending…"},
es:{titre:"Declaración de activos (art. 684 C.P.C.)",intro:"Complete este formulario. Sus respuestas se envían de forma segura a la oficina.",identite:"Identidad",nom:"Nombre completo",naiss:"Fecha de nacimiento",adresse:"Dirección completa",tels:"Teléfonos",courriels:"Correos",ajouter:"+ Añadir",numero:"Número",courriel:"Correo",emploi:"Situación laboral",nomEmp:"Nombre del empleador",adrEmp:"Dirección",telEmp:"Teléfono",residence:"Residencia principal",compte:"Cuenta bancaria",inst:"Institución",succ:"Dirección de la sucursal",signature:"Fecha de firma",notes:"Notas (opcional)",envoyer:"Enviar mi declaración",merci:"¡Gracias! Su declaración fue enviada a la oficina.",invalide:"Este enlace ya no es válido (caducado o utilizado). Contacte a la oficina.",salarie:"Asalariado",autonome:"Autónomo",autre:"Otro",proprio:"Propietario",locataire:"Inquilino",cell:"Celular",res:"Residencia",trav:"Trabajo",envoi:"Enviando…"}};
var token=location.hash.replace(/^#/,'').split('&')[0].replace(/^t=/,'');
var root=document.getElementById('root');
function invalide(L){root.innerHTML='<div class="card ok"><h2>⚠️</h2><p class="err">'+L.invalide+'</p></div>';}
(async function(){
var L=I.fr;
try{
  var info=await (await fetch(FONC+'?t='+encodeURIComponent(token))).json();
  L=I[info.langue===1?'en':info.langue===2?'es':'fr'];document.documentElement.lang=document.documentElement.lang;
  if(!info.valide){invalide(L);return;}
}catch(e){invalide(L);return;}
document.title=L.titre;
root.innerHTML='<h1>'+L.titre+'</h1><div class="intro">'+L.intro+'</div><form id="f">'
+'<div class="card"><h2>'+L.identite+'</h2><label>'+L.nom+'</label><input name="nom_prenom" required>'
+'<label>'+L.naiss+'</label><input name="date_naissance" type="date"><label>'+L.adresse+'</label><textarea name="adresse_complete"></textarea></div>'
+'<div class="card"><h2>'+L.tels+'</h2><div id="tels"></div><button type="button" class="add" id="addtel">'+L.ajouter+'</button></div>'
+'<div class="card"><h2>'+L.courriels+'</h2><div id="mails"></div><button type="button" class="add" id="addmail">'+L.ajouter+'</button></div>'
+'<div class="card"><h2>'+L.emploi+'</h2><select name="situation_emploi"><option>'+L.salarie+'</option><option>'+L.autonome+'</option><option>'+L.autre+'</option></select>'
+'<label>'+L.nomEmp+'</label><input name="emp_nom"><label>'+L.adrEmp+'</label><input name="emp_adresse"><label>'+L.telEmp+'</label><input name="emp_tel"></div>'
+'<div class="card"><h2>'+L.residence+'</h2><select name="residence_principale"><option>'+L.proprio+'</option><option>'+L.locataire+'</option></select></div>'
+'<div class="card"><h2>'+L.compte+'</h2><label>'+L.inst+'</label><input name="cpt_inst"><label>'+L.succ+'</label><input name="cpt_succ"><label>'+L.telEmp+'</label><input name="cpt_tel"></div>'
+'<div class="card"><label>'+L.signature+'</label><input name="date_signature" type="date"><label>'+L.notes+'</label><textarea name="notes"></textarea></div>'
+'<button type="submit" class="send" id="sb">'+L.envoyer+'</button></form>';
function telRow(){var d=document.createElement('div');d.className='row';d.innerHTML='<select class="tt"><option>'+L.cell+'</option><option>'+L.res+'</option><option>'+L.trav+'</option></select><input class="tn" placeholder="'+L.numero+'">';document.getElementById('tels').appendChild(d);}
function mailRow(){var d=document.createElement('div');d.className='row';d.innerHTML='<input class="mm" type="email" placeholder="'+L.courriel+'">';document.getElementById('mails').appendChild(d);}
telRow();mailRow();
document.getElementById('addtel').onclick=telRow;document.getElementById('addmail').onclick=mailRow;
document.getElementById('f').onsubmit=async function(e){e.preventDefault();var b=document.getElementById('sb');b.disabled=true;b.textContent=L.envoi;
var g=function(n){var el=document.querySelector('[name='+n+']');return el?el.value:'';};
var tels=[];document.querySelectorAll('#tels .row').forEach(function(r){var n=r.querySelector('.tn').value;if(n)tels.push({type:r.querySelector('.tt').value,numero:n});});
var mails=[];document.querySelectorAll('#mails .mm').forEach(function(m){if(m.value)mails.push(m.value);});
var data={token:token,nom_prenom:g('nom_prenom'),date_naissance:g('date_naissance'),adresse_complete:g('adresse_complete'),situation_emploi:g('situation_emploi'),residence_principale:g('residence_principale'),date_signature:g('date_signature'),notes:g('notes'),emp_nom:g('emp_nom'),emp_adresse:g('emp_adresse'),emp_tel:g('emp_tel'),cpt_inst:g('cpt_inst'),cpt_succ:g('cpt_succ'),cpt_tel:g('cpt_tel'),telephones:tels,courriels:mails};
try{var rep=await fetch(FONC,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
if(rep.ok){root.innerHTML='<div class="card ok"><h2>✓</h2><p>'+L.merci+'</p></div>';}else{b.disabled=false;b.textContent=L.envoyer;invalide(L);}}
catch(x){b.disabled=false;b.textContent=L.envoyer;}};
})();
</script></body></html>
